{% extends "base.html" %}
{% block title %}Mi perfil{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2><i class="fas fa-user-cog"></i> Mi perfil</h2>
    <div class="row">
        <div class="col-md-6">
            <form method="POST">
                <div class="mb-3"><label>Nombre</label><input type="text" name="username" class="form-control" value="{{ current_user.username }}"></div>
                <div class="mb-3"><label>Teléfono</label><input type="text" name="phone" class="form-control" value="{{ current_user.phone }}"></div>
                <div class="mb-3"><label>Email</label><input type="email" class="form-control" value="{{ current_user.email }}" disabled></div>
                <div class="mb-3"><label>Nueva contraseña</label><input type="password" name="password" class="form-control" placeholder="Dejar en blanco para no cambiar"></div>
                <div class="mb-3"><label>Confirmar contraseña</label><input type="password" name="confirm_password" class="form-control" placeholder="Repetir nueva contraseña"></div>
                <button type="submit" class="btn btn-primary">Actualizar perfil</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
