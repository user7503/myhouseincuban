{% extends "base.html" %}
{% block title %}Contacto{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2>Contacto</h2>
    <div class="row">
        <div class="col-md-6">
            <form method="POST">
                <div class="mb-3"><input type="text" name="name" class="form-control" placeholder="Nombre" required></div>
                <div class="mb-3"><input type="email" name="email" class="form-control" placeholder="Email" required></div>
                <div class="mb-3"><input type="text" name="phone" class="form-control" placeholder="Teléfono"></div>
                <div class="mb-3"><textarea name="message" class="form-control" rows="4" placeholder="Mensaje" required></textarea></div>
                <button type="submit" class="btn btn-primary">Enviar</button>
            </form>
        </div>
        <div class="col-md-6">
            <h5>Información de contacto</h5>
            <p><i class="fas fa-envelope"></i> info@myhouseincuban.com</p>
            <p><i class="fas fa-phone"></i> +53 5 123 4567</p>
            <p><i class="fas fa-map-marker-alt"></i> La Habana, Cuba</p>
        </div>
    </div>
</div>
{% endblock %}
