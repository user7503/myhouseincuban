{% extends "base.html" %}{% block title %}Editar Plan{% endblock %}{% block content %}
<div class="container-fluid mt-4"><div class="row"><div class="col-md-2">{% include 'admin/_sidebar.html' %}</div><div class="col-md-10">
<h2>Editar Plan</h2>
<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3"><label>Nombre</label><input type="text" name="name" class="form-control" value="{{ plan.name }}"></div>
    <div class="mb-3"><label>Propiedades máx. (0=ilimitado)</label><input type="number" name="max_properties" class="form-control" value="{{ plan.max_properties }}"></div>
    <div class="mb-3"><label>Precio mensual</label><input type="number" step="0.01" name="price_monthly" class="form-control" value="{{ plan.price_monthly }}"></div>
    <div class="mb-3 form-check"><input type="checkbox" name="can_feature" class="form-check-input" id="can_feature" {% if plan.can_feature %}checked{% endif %}><label class="form-check-label" for="can_feature">Permite destacar</label></div>
    <button type="submit" class="btn btn-primary">Guardar</button>
</form>
</div></div></div>
{% endblock %}
